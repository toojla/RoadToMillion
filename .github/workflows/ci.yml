name: CI

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      api-artifact: api-publish

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore dependencies
        run: dotnet restore RoadToMillion.slnx

      - name: Build API
        run: dotnet build src/RoadToMillion.Api/RoadToMillion.Api.csproj --no-restore --configuration Release

      - name: Build Web
        run: dotnet build src/RoadToMillion.Web/RoadToMillion.Web.csproj --no-restore --configuration Release

      - name: Publish API
        run: dotnet publish src/RoadToMillion.Api/RoadToMillion.Api.csproj --no-restore --configuration Release --output ./publish/api

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-publish
          path: ./publish/api
          retention-days: 1

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore dependencies
        run: dotnet restore tests/RoadToMillion.UnitTests/RoadToMillion.UnitTests.csproj

      - name: Run unit tests
        run: >
          dotnet test tests/RoadToMillion.UnitTests/RoadToMillion.UnitTests.csproj
          --no-restore
          --configuration Release
          --logger "trx;LogFileName=test-results.trx"
          --results-directory ./test-results

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ./test-results/*.trx
          retention-days: 7

  deploy:
    name: Deploy API
    runs-on: ubuntu-latest
    needs: [build, test]
    environment: production

    steps:
      - name: Download API artifact
        uses: actions/download-artifact@v4
        with:
          name: api-publish
          path: ./publish/api

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: app-roadtomillion-api-001-prod
          package: ./publish/api
