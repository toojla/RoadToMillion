name: Deploy Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: Production
        type: choice
        options:
          - Production
      what_if:
        description: "Run what-if only (no changes deployed)"
        required: false
        default: false
        type: boolean

permissions:
  id-token: write   # required for OIDC login
  contents: read

concurrency:
  group: deploy-infrastructure-${{ inputs.environment }}
  cancel-in-progress: false  # never cancel an in-flight infrastructure deploy

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bicep CLI
        run: az bicep install

      - name: Lint
        run: bicep lint iac/main.bicep

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
            creds: ${{ secrets.AZURE_CREDENTIALS }}
            # client-id: ${{ secrets.AZURE_CLIENT_ID }}
            # tenant-id: ${{ secrets.AZURE_TENANT_ID }}
            # subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate template
        run: |
          az deployment sub validate \
            --location swedencentral \
            --template-file iac/main.bicep \
            --parameters iac/main.${{ inputs.environment }}.bicepparam \
            --parameters postgresAdminPassword="${{ secrets.POSTGRES_ADMIN_PASSWORD }}"

  what-if:
    name: What-if
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
            creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: What-if
        run: |
          az deployment sub what-if \
            --location swedencentral \
            --template-file iac/main.bicep \
            --parameters iac/main.${{ inputs.environment }}.bicepparam \
            --parameters postgresAdminPassword="${{ secrets.POSTGRES_ADMIN_PASSWORD }}"

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: what-if
    if: ${{ inputs.what_if == false }}
    environment: ${{ inputs.environment }}  # triggers required reviewers gate in GitHub

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
            creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy
        run: |
          az deployment sub create \
            --location swedencentral \
            --template-file iac/main.bicep \
            --parameters iac/main.${{ inputs.environment }}.bicepparam \
            --parameters postgresAdminPassword="${{ secrets.POSTGRES_ADMIN_PASSWORD }}" \
            --name "deploy-roadtomillion-${{ inputs.environment }}-${{ github.run_number }}"

      - name: Show outputs
        run: |
          az deployment sub show \
            --name "deploy-roadtomillion-${{ inputs.environment }}-${{ github.run_number }}" \
            --query "properties.outputs" \
            --output table
